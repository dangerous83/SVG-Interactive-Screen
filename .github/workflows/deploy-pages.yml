# Builds the Vite app and publishes dist/ to GitHub Pages.
# Runs on pushes to main and to the development branch so the live URL
# (https://dangerous83.github.io/SVG-Interactive-Screen/) always shows the latest build.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/securevisa-itsec-command-center-h077mo
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer runs supersede older queued ones.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Switches the repo's Pages source to "GitHub Actions" if it is
          # still set to "Deploy from a branch".
          enablement: true

      - name: Upload dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
