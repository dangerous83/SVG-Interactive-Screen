# Builds the Vite app and publishes dist/ to GitHub Pages.
# Runs on pushes to main and to the development branch so the live URL
# (https://dangerous83.github.io/SVG-Interactive-Screen/) always shows the latest build.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Self-heal: if the repo's Pages "Source" is still "Deploy from a branch",
  # GitHub also runs its managed "pages build and deployment" (Jekyll) job on
  # every push, which publishes the RAW, uncompiled source and can win the race,
  # leaving the site blank. Re-run this build right after that job finishes so the
  # COMPILED app is always the last deployment. (The permanent fix is still to set
  # Settings → Pages → Source → "GitHub Actions", which stops the Jekyll job.)
  workflow_run:
    workflows: ["pages-build-deployment", "pages build and deployment"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer runs supersede older queued ones.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Switches the repo's Pages source to "GitHub Actions" if it is
          # still set to "Deploy from a branch".
          enablement: true

      - name: Upload dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
